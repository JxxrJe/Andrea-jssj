<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mensaje</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  color: white;
  font-family: Arial;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

.container {
  max-width: 700px;
  margin: auto;
  text-align: center;
  padding-top: 10vh;
  line-height: 1.6;
}

/* cursor typing */
#texto::after {
  content: "|";
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}

button {
  padding: 12px 25px;
  margin: 10px;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
  opacity: 0;
  transform: translateY(20px);
  animation: aparecer 1s forwards;
}

@keyframes aparecer {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.yes { background: #00cc88; color: white; }
.no { background: #cc4444; color: white; }

/* corazón rojo */
.heart-big {
  font-size: 130px;
  cursor: pointer;
  animation: latido 1s infinite;
  color: red;
  text-shadow: 0 0 25px red;
}

@keyframes latido {
  50% { transform: scale(1.3); }
}

/* corazón roto */
.broken {
  font-size: 120px;
  position: relative;
}

.broken::before, .broken::after {
  content: "🤍";
  position: absolute;
}

.broken::before {
  left: -10px;
  animation: leftBreak 1s forwards;
}

.broken::after {
  right: -10px;
  animation: rightBreak 1s forwards;
}

@keyframes leftBreak {
  to { transform: translateX(-60px) rotate(-30deg); opacity: 0; }
}

@keyframes rightBreak {
  to { transform: translateX(60px) rotate(30deg); opacity: 0; }
}

#respuesta {
  white-space: pre-line;
  padding: 20px;
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="container" id="main">
  <p id="texto"></p>
  <div id="botones"></div>
</div>

<script>
// TEXTO
const textoCompleto = `Mientras el código corre en silencio y cada línea encuentra su lugar, hay algo que no se puede compilar ni programar: lo que siento cuando pienso en ti. Como un algoritmo perfecto, apareces en el momento justo, dando sentido a todo lo demás. Entre funciones y variables, entendí que hay conexiones que van más allá de la lógica, y la nuestra es una de ellas.

Si pudiera optimizar algo en mi vida, sería el tiempo para compartirlo contigo, porque contigo todo funciona mejor, más claro, más bonito… como si cada error encontrara solución.

Y entre todo este mundo de código y sistemas, solo me queda una pregunta sincera: ¿me permites estar cerca de ti?`;

let i = 0;

function escribir() {
  if (i < textoCompleto.length) {
    document.getElementById("texto").innerHTML += textoCompleto.charAt(i);
    i++;
    setTimeout(escribir, 60);
  } else {
    mostrarBotones();
  }
}

escribir();

// BOTONES
function mostrarBotones() {
  document.getElementById("botones").innerHTML =
  `<div>
    <button class="yes" onclick="mostrarCorazon()">Sí 💚</button>
    <button class="no" onclick="romperCorazon()">No 💔</button>
  </div>`;
}

// ❤️ SI
function mostrarCorazon() {
  if (navigator.vibrate) {
    navigator.vibrate([100, 30, 100, 30, 200]);
  }

  document.getElementById("main").innerHTML =
  '<div class="heart-big" onclick="mensajeSi()">❤️</div>';
}

function mensajeSi() {
  document.getElementById("main").innerHTML =
`<p id="respuesta">
Sé que no todo ha sido perfecto, y no voy a negar mis errores… pero hoy quiero hablarte desde lo más sincero de mí. No fallaré más, porque entendí lo que realmente importa y el valor que tienes en mi vida.

De mí solo vas a recibir lo mejor: mi esfuerzo, mi tiempo, mi respeto y un cariño que quiere hacer las cosas bien, sin excusas ni dudas. No prometo ser perfecto, pero sí ser constante y demostrarte con hechos lo que significas para mí.

Espero que esto sea un nuevo comienzo, uno donde la confianza crezca poco a poco y donde podamos sentirnos seguros el uno con el otro. Porque más que empezar de nuevo, quiero hacerlo mejor… contigo.

Te amitooooo, mi amor. ❤️
</p>`;
}

// 🤍 NO
function romperCorazon() {
  if (navigator.vibrate) {
    navigator.vibrate([300, 100, 300]);
  }

  document.getElementById("main").innerHTML =
  '<div class="broken"></div>';

  setTimeout(() => {
    document.getElementById("main").innerHTML =
`<p id="respuesta">
No es fácil despedirse, pero a veces es necesario para que cada uno siga su camino. Quiero que sepas que, pase lo que pase, siempre vas a tener en mí a alguien que te aprecia de verdad. Me llevo los buenos momentos, las sonrisas y todo lo bonito que compartimos.

La distancia no cambia lo que siento como persona hacia ti: respeto, cariño y buenos deseos. Y aunque ya no estemos tan cerca como antes, puedes contar conmigo cuando lo necesites, porque mi apoyo y mi cariño no desaparecen con una despedida.

Cuídate mucho… y recuerda que siempre habrá alguien aquí que quiere verte. 💔
</p>`;
  }, 1200);
}

// ESTRELLAS
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];
for (let i = 0; i < 120; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 2,
    speed: Math.random() * 0.8
  });
}

function drawStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "white";
  stars.forEach(s => {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fill();

    s.y += s.speed;
    if (s.y > canvas.height) {
      s.y = 0;
      s.x = Math.random() * canvas.width;
    }
  });

  requestAnimationFrame(drawStars);
}

drawStars();
</script>

</body>
</html>
