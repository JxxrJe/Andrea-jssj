<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Andrea ❤️</title>

<style>
  body {
    margin: 0;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial;
    text-align: center;
    color: white;
  }

  .container {
    max-width: 90%;
  }

  h1 {
    font-size: 2.2em;
    min-height: 60px;
  }

  .heart {
    font-size: 60px;
    animation: latido 1s infinite;
  }

  @keyframes latido {
    0%,100% {transform:scale(1);}
    50% {transform:scale(1.3);}
  }

  .frase {
    opacity: 0;
    margin-top: 10px;
    font-size: 1.3em;
  }

  .mostrar {
    animation: aparecer 2s forwards;
  }

  @keyframes aparecer {
    to {opacity:1;}
  }

  button {
    margin-top: 20px;
    padding: 12px 20px;
    border: none;
    border-radius: 20px;
    background: white;
    color: #ff4d88;
    cursor: pointer;
    font-size: 1em;
  }

  .final {
    opacity: 0;
    margin-top: 20px;
    font-size: 1.5em;
    font-weight: bold;
  }
</style>
</head>

<body>

<div class="container">

  <h1 id="texto"></h1>
  <div class="heart">❤️</div>

  <div id="f1" class="frase">Eres la mejor ✨</div>
  <div id="f2" class="frase">Y aún siento algo real por ti...</div>

  <div id="final" class="final">¿Me darías otra oportunidad? 💔➡️❤️‍🩹</div>

  <button onclick="iniciar()">Toca aquí 💖</button>

</div>

<script>
  const mensaje = "Te amo Andrea ❤️";
  let i = 0;

  function escribir() {
    if (i < mensaje.length) {
      document.getElementById("texto").innerHTML += mensaje.charAt(i);
      i++;
      setTimeout(escribir, 100);
    }
  }

  function iniciar() {

    document.querySelector("button").style.display = "none";

    // 🎵 ABRE LA CANCIÓN DE YOKO
    window.open("https://www.youtube.com/watch?v=REEMPLAZA_ESTO", "_blank");

    escribir();

    setTimeout(() => {
      document.getElementById("f1").classList.add("mostrar");
    }, 2000);

    setTimeout(() => {
      document.getElementById("f2").classList.add("mostrar");
    }, 4000);

    setTimeout(() => {
      document.getElementById("final").classList.add("mostrar");
    }, 6500);

  }
</script>

</body>
</html>
