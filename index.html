<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mensaje</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  color: white;
  font-family: Arial;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* portada */
.portada {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  cursor: pointer;
  flex-direction: column;
}

.flor {
  font-size: 100px;
  animation: latido 1.5s infinite;
}

@keyframes latido {
  50% { transform: scale(1.2); }
}

.texto-portada {
  margin-top: 15px;
  font-size: 18px;
  opacity: 0.7;
}

/* contenido */
.container {
  max-width: 700px;
  margin: auto;
  text-align: center;
  padding-top: 10vh;
  line-height: 1.6;
}

/* cursor typing */
#texto::after {
  content: "|";
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}

button {
  padding: 12px 25px;
  margin: 10px;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
}

.yes { background: #00cc88; }
.no { background: #cc4444; }

/* corazón */
.heart-big {
  font-size: 130px;
  animation: latido 1s infinite;
  color: red;
}

.broken {
  font-size: 120px;
  position: relative;
}

.broken::before, .broken::after {
  content: "🤍";
  position: absolute;
}

.broken::before {
  left: -10px;
  animation: leftBreak 1s forwards;
}

.broken::after {
  right: -10px;
  animation: rightBreak 1s forwards;
}

@keyframes leftBreak {
  to { transform: translateX(-60px) rotate(-30deg); opacity: 0; }
}

@keyframes rightBreak {
  to { transform: translateX(60px) rotate(30deg); opacity: 0; }
}

#respuesta {
  white-space: pre-line;
  padding: 20px;
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<!-- PORTADA -->
<div class="portada" id="portada" onclick="iniciar()">
  <div class="flor">💐</div>
  <div class="texto-portada">Toca el ramo 🌹</div>
</div>

<!-- CONTENIDO -->
<div class="container" id="main" style="display:none;">
  <p id="texto"></p>
  <div id="botones"></div>
</div>

<script>
// INICIAR
function iniciar() {
  document.getElementById("portada").style.display = "none";
  document.getElementById("main").style.display = "block";
  escribir();
}

// TEXTO
const textoCompleto = `Mientras el código corre en silencio y cada línea encuentra su lugar, hay algo que no se puede compilar ni programar: lo que siento cuando pienso en ti. Como un algoritmo perfecto, apareces en el momento justo, dando sentido a todo lo demás. Entre funciones y variables, entendí que hay conexiones que van más allá de la lógica, y la nuestra es una de ellas.

Si pudiera optimizar algo en mi vida, sería el tiempo para compartirlo contigo, porque contigo todo funciona mejor, más claro, más bonito… como si cada error encontrara solución.

Y entre todo este mundo de código y sistemas, solo me queda una pregunta sincera: ¿me permites estar cerca de ti?`;

let i = 0;

function escribir() {
  if (i < textoCompleto.length) {
    document.getElementById("texto").innerHTML += textoCompleto.charAt(i);
    i++;
    setTimeout(escribir, 80); // MÁS LENTO
  } else {
    mostrarBotones();
  }
}

// BOTONES
function mostrarBotones() {
  document.getElementById("botones").innerHTML =
  `<button class="yes" onclick="mostrarCorazon()">Sí 💚</button>
   <button class="no" onclick="romperCorazon()">No 💔</button>`;
}

// SI
function mostrarCorazon() {
  if (navigator.vibrate) navigator.vibrate([100,30,100,30,200]);
  document.getElementById("main").innerHTML =
  '<div class="heart-big" onclick="mensajeSi()">❤️</div>';
}

function mensajeSi() {
  document.getElementById("main").innerHTML =
`<p id="respuesta">Te amitooooo, mi amor ❤️</p>`;
}

// NO
function romperCorazon() {
  if (navigator.vibrate) navigator.vibrate([300,100,300]);

  document.getElementById("main").innerHTML =
  '<div class="broken"></div>';

  setTimeout(() => {
    document.getElementById("main").innerHTML =
`<p id="respuesta">Cuídate mucho… 💔</p>`;
  }, 1200);
}

// ESTRELLAS
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];
for (let i = 0; i < 120; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 2,
    speed: Math.random() * 0.8
  });
}

function drawStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "white";

  stars.forEach(s => {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fill();

    s.y += s.speed;
    if (s.y > canvas.height) {
      s.y = 0;
      s.x = Math.random() * canvas.width;
    }
  });

  requestAnimationFrame(drawStars);
}

drawStars();
</script>

</body>
</html>
