<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mensaje</title>

<style>
body {
  background: #0d0d0d;
  color: white;
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
  overflow: hidden;
}

.container {
  text-align: center;
  max-width: 700px;
}

button {
  padding: 12px 25px;
  margin: 10px;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
}

.yes { background: #00cc88; color: white; }
.no { background: #cc4444; color: white; }

/* ❤️ corazón grande rojo */
.heart-big {
  font-size: 130px;
  cursor: pointer;
  animation: latido 1s infinite;
  color: red;
  text-shadow: 0 0 20px red;
}

@keyframes latido {
  0% { transform: scale(1); }
  50% { transform: scale(1.25); }
  100% { transform: scale(1); }
}

/* 🤍 corazón roto */
.broken {
  font-size: 120px;
  position: relative;
}

.broken::before, .broken::after {
  content: "🤍";
  position: absolute;
}

.broken::before {
  left: -10px;
  animation: leftBreak 1s forwards;
}

.broken::after {
  right: -10px;
  animation: rightBreak 1s forwards;
}

@keyframes leftBreak {
  to { transform: translateX(-50px) rotate(-25deg); opacity: 0; }
}

@keyframes rightBreak {
  to { transform: translateX(50px) rotate(25deg); opacity: 0; }
}

#respuesta {
  margin-top: 20px;
  white-space: pre-line;
}
</style>

</head>

<body>

<div class="container" id="main">

<p>¿me permites estar cerca de ti?</p>

<button class="yes" onclick="mostrarCorazon()">Sí 💚</button>
<button class="no" onclick="romperCorazon()">No 💔</button>

<div id="respuesta"></div>

</div>

<script>
function mostrarCorazon() {
  document.getElementById("main").innerHTML =
  '<div class="heart-big" onclick="mensajeSi()">❤️</div>';
}

function mensajeSi() {
  document.getElementById("main").innerHTML =
`<p id="respuesta">
Sé que no todo ha sido perfecto, y no voy a negar mis errores… pero hoy quiero hablarte desde lo más sincero de mí. No fallaré más, porque entendí lo que realmente importa y el valor que tienes en mi vida.

De mí solo vas a recibir lo mejor: mi esfuerzo, mi tiempo, mi respeto y un cariño que quiere hacer las cosas bien, sin excusas ni dudas. No prometo ser perfecto, pero sí ser constante y demostrarte con hechos lo que significas para mí.

Espero que esto sea un nuevo comienzo, uno donde la confianza crezca poco a poco y donde podamos sentirnos seguros el uno con el otro. Porque más que empezar de nuevo, quiero hacerlo mejor… contigo.

Te amitooooo, mi amor. ❤️
</p>`;
}

function romperCorazon() {
  document.getElementById("main").innerHTML =
  '<div class="broken"></div>';

  setTimeout(() => {
    document.getElementById("main").innerHTML =
`<p id="respuesta">
No es fácil despedirse, pero a veces es necesario para que cada uno siga su camino. Quiero que sepas que, pase lo que pase, siempre vas a tener en mí a alguien que te aprecia de verdad. Me llevo los buenos momentos, las sonrisas y todo lo bonito que compartimos.

La distancia no cambia lo que siento como persona hacia ti: respeto, cariño y buenos deseos. Y aunque ya no estemos tan cerca como antes, puedes contar conmigo cuando lo necesites, porque mi apoyo y mi cariño no desaparecen con una despedida.

Cuídate mucho… y recuerda que siempre habrá alguien aquí que quiere verte. 💔
</p>`;
  }, 1200);
}
</script>

</body>
</html>
