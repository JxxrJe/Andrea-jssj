<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mensaje</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
  color:white;
  font-family:'Segoe UI',sans-serif;
}

canvas{
  position:fixed;
  z-index:-1;
}

/* portada */
.portada{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  cursor:pointer;
}

.flor{
  font-size:120px;
  animation:latido 2s infinite;
}

@keyframes latido{
  50%{transform:scale(1.15);}
}

/* contenido */
.container{
  max-width:700px;
  margin:auto;
  text-align:center;
  padding-top:10vh;
  line-height:1.8;
}

/* typing */
#texto::after{
  content:"|";
  animation:blink 1s infinite;
}

@keyframes blink{
  50%{opacity:0;}
}

/* botones */
button{
  padding:14px 30px;
  margin:15px;
  border:none;
  border-radius:10px;
  font-size:18px;
  cursor:pointer;
}

.yes{background:#00cc88;}
.no{background:#cc4444;}

/* lluvia corazones */
.heart{
  position:fixed;
  font-size:40px;
  animation:caer 6s linear forwards;
}

@keyframes caer{
  from{transform:translateY(-100px);opacity:1;}
  to{transform:translateY(110vh);opacity:0;}
}

/* texto final */
.fade-text{
  opacity:0;
  animation:aparecer 3s forwards;
}

@keyframes aparecer{
  to{opacity:1;}
}

/* abrazo */
.final{
  font-size:45px;
  margin-top:30px;
  color:red;
  cursor:pointer;
  animation:latido 1.5s infinite;
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<!-- portada -->
<div class="portada" id="portada" onclick="iniciar()">
  <div class="flor">🌹</div>
  <p>Toca el ramo</p>
</div>

<div class="container" id="main" style="display:none;">
  <p id="texto"></p>
  <div id="botones"></div>
</div>

<script>
// iniciar
function iniciar(){
  document.getElementById("portada").style.display="none";
  document.getElementById("main").style.display="block";
  escribir();
}

// texto
const textoCompleto = `Mientras el código corre en silencio y cada línea encuentra su lugar, hay algo que no se puede compilar ni programar: lo que siento cuando pienso en ti. Como un algoritmo perfecto, apareces en el momento justo, dando sentido a todo lo demás. Entre funciones y variables, entendí que hay conexiones que van más allá de la lógica, y la nuestra es una de ellas.

Si pudiera optimizar algo en mi vida, sería el tiempo para compartirlo contigo, porque contigo todo funciona mejor, más claro, más bonito… como si cada error encontrara solución.

Y entre todo este mundo de código y sistemas, solo me queda una pregunta sincera: ¿me permites estar cerca de ti?`;

let i=0;

function escribir(){
  if(i<textoCompleto.length){
    document.getElementById("texto").innerHTML+=textoCompleto.charAt(i);
    i++;
    setTimeout(escribir,90);
  }else{
    botones();
  }
}

// botones
function botones(){
  document.getElementById("botones").innerHTML=
  `<button class="yes" onclick="aceptar()">Sí 💚</button>
   <button class="no" onclick="rechazar()">No 💔</button>`;
}

// lluvia corazones
function lluvia(){
  for(let i=0;i<40;i++){
    let h=document.createElement("div");
    h.className="heart";
    h.innerText="❤️";
    h.style.left=Math.random()*100+"vw";
    h.style.fontSize=(30+Math.random()*40)+"px";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),6000);
  }
}

// SI
function aceptar(){
  if(navigator.vibrate) navigator.vibrate([100,50,150]);

  lluvia();

  setTimeout(()=>{
    document.getElementById("main").innerHTML=
`<div class="fade-text">
<p>
Sé que no todo ha sido perfecto, y no voy a negar mis errores… pero hoy quiero hablarte desde lo más sincero de mí. No fallaré más, porque entendí lo que realmente importa y el valor que tienes en mi vida.

De mí solo vas a recibir lo mejor: mi esfuerzo, mi tiempo, mi respeto y un cariño que quiere hacer las cosas bien, sin excusas ni dudas. No prometo ser perfecto, pero sí ser constante y demostrarte con hechos lo que significas para mí.

Espero que esto sea un nuevo comienzo, uno donde la confianza crezca poco a poco y donde podamos sentirnos seguros el uno con el otro. Porque más que empezar de nuevo, quiero hacerlo mejor… contigo.

Te amitooooo, mi amor ❤️
</p>

<div class="final" onclick="abrazo()">abrazhooo ❤️</div>
</div>`;
  },2000);
}

// NO
function rechazar(){
  if(navigator.vibrate) navigator.vibrate([300,100,300]);

  lluvia();

  setTimeout(()=>{
    document.getElementById("main").innerHTML=
`<div class="fade-text">
<p>
No es fácil despedirse, pero a veces es necesario para que cada uno siga su camino. Quiero que sepas que, pase lo que pase, siempre vas a tener en mí a alguien que te aprecia de verdad. Me llevo los buenos momentos, las sonrisas y todo lo bonito que compartimos.

La distancia no cambia lo que siento como persona hacia ti: respeto, cariño y buenos deseos. Y aunque ya no estemos tan cerca como antes, puedes contar conmigo cuando lo necesites, porque mi apoyo y mi cariño no desaparecen con una despedida.

Cuídate mucho… y recuerda que siempre habrá alguien aquí que quiere verte 💔
</p>

<div class="final" onclick="abrazo()">abrazhooo ❤️</div>
</div>`;
  },2000);
}

// abrazo
function abrazo(){
  if(navigator.vibrate) navigator.vibrate([200,50,200,50,300]);
  alert("🫂❤️");
}

// estrellas
const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

let stars=[];
for(let i=0;i<150;i++){
  stars.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    size:Math.random()*2,
    speed:Math.random()*0.5
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="white";

  stars.forEach(s=>{
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
    ctx.fill();

    s.y+=s.speed;
    if(s.y>canvas.height){
      s.y=0;
      s.x=Math.random()*canvas.width;
    }
  });

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
